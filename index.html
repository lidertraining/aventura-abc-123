<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🌟 Aventura do ABC e 123</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
  html,body { height:100%; overflow:hidden; }
  body {
    font-family:'Fredoka','Comic Sans MS','Segoe UI',sans-serif;
    background:linear-gradient(135deg,#7f7fd5 0%,#86a8e7 50%,#91eae4 100%);
    display:flex; align-items:center; justify-content:center; position:relative;
  }
  .bubble { position:absolute; border-radius:50%; opacity:.18; background:#fff; animation:floatUp linear infinite; pointer-events:none; z-index:0; }
  @keyframes floatUp { from { transform:translateY(110vh) scale(.6) rotate(0); } to { transform:translateY(-15vh) scale(1.1) rotate(360deg); } }
  .floatmoji { position:absolute; font-size:38px; opacity:.25; pointer-events:none; z-index:0; animation:drift ease-in-out infinite alternate; }
  @keyframes drift { from { transform:translateY(0) rotate(-8deg); } to { transform:translateY(-30px) rotate(8deg); } }

  #app {
    width:min(560px,96vw); height:min(880px,98vh);
    background:rgba(255,255,255,.93); border-radius:34px;
    box-shadow:0 24px 60px rgba(30,30,80,.35);
    position:relative; z-index:2; overflow:hidden; display:flex; flex-direction:column;
  }
  .screen { display:none; flex-direction:column; align-items:center; flex:1; padding:10px 20px 20px; overflow-y:auto; }
  .screen.active { display:flex; animation:pop .45s cubic-bezier(.34,1.56,.64,1); }
  @keyframes pop { from { transform:scale(.85); opacity:0; } to { transform:scale(1); opacity:1; } }

  #hud { width:100%; display:flex; align-items:center; justify-content:space-between; padding:12px 16px 4px; gap:8px; }
  .hud-pill {
    background:linear-gradient(135deg,#ffd54f,#ffb300); color:#5d3600; font-weight:700; font-size:20px;
    padding:8px 16px; border-radius:999px; box-shadow:0 4px 0 #e69100; cursor:pointer; border:none; font-family:inherit;
    display:flex; align-items:center; gap:6px; transition:transform .2s;
  }
  .hud-pill.bump { animation:bump .5s; }
  @keyframes bump { 30% { transform:scale(1.3) rotate(-6deg); } }
  .hud-btn { background:#fff; border:none; font-size:24px; width:48px; height:48px; border-radius:15px; box-shadow:0 4px 0 #cfd4ff; cursor:pointer; }
  .hud-btn:active { transform:translateY(3px); box-shadow:0 1px 0 #cfd4ff; }
  #profile-chip {
    display:flex; align-items:center; gap:6px; background:#fff; border:none; cursor:pointer;
    border-radius:15px; padding:5px 12px; box-shadow:0 4px 0 #cfd4ff;
    font-family:inherit; font-weight:700; color:#454a75; font-size:15px; min-height:48px;
  }
  #profile-chip .av { font-size:26px; }
  #profile-chip:active { transform:translateY(3px); box-shadow:0 1px 0 #cfd4ff; }

  #mascot, .mascot { font-size:80px; animation:mascotJump 2.6s ease-in-out infinite; cursor:pointer; filter:drop-shadow(0 8px 10px rgba(0,0,0,.18)); }
  @keyframes mascotJump { 0%,100%{transform:translateY(0) rotate(-3deg);} 50%{transform:translateY(-16px) rotate(3deg);} }
  h1.title {
    font-size:clamp(24px,6vw,34px); text-align:center; line-height:1.15; margin:2px 0;
    background:linear-gradient(90deg,#ff5f6d,#ffc371,#38ef7d,#40c9ff,#a044ff);
    -webkit-background-clip:text; background-clip:text; color:transparent; font-weight:700;
  }
  .subtitle { color:#7a7fa8; font-size:15px; margin-bottom:8px; text-align:center; }

  .mode-btn {
    width:100%; max-width:420px; border:none; cursor:pointer; border-radius:22px;
    padding:13px 20px; margin:5px 0; display:flex; align-items:center; gap:14px;
    font-family:inherit; font-weight:700; color:#fff; transition:transform .15s;
  }
  .mode-btn:active { transform:scale(.96); }
  .mode-btn .ic { font-size:38px; }
  .mode-btn .tx { text-align:left; flex:1; }
  .mode-btn .tx b { font-size:22px; display:block; }
  .mode-btn .tx span { font-size:12.5px; opacity:.92; font-weight:400; display:block; }
  #btn-pt    { background:linear-gradient(135deg,#36d1dc,#5b86e5); box-shadow:0 6px 0 #3d63b8; }
  #btn-math  { background:linear-gradient(135deg,#ff9966,#ff5e62); box-shadow:0 6px 0 #d33f43; }
  #btn-en    { background:linear-gradient(135deg,#11998e,#38ef7d); box-shadow:0 6px 0 #0c6b62; }
  #btn-de    { background:linear-gradient(135deg,#f9d423,#e14e4e); box-shadow:0 6px 0 #9c2b2b; }
  #btn-shop  { background:linear-gradient(135deg,#f7971e,#ffd200); box-shadow:0 6px 0 #c47f12; color:#5d3600; }
  #btn-album { background:linear-gradient(135deg,#a8e063,#56ab2f); box-shadow:0 6px 0 #3f7f22; }
  #btn-journey { background:linear-gradient(135deg,#c471f5,#a044ff); box-shadow:0 6px 0 #6a3093; }

  /* perfis */
  .profile-grid { display:flex; flex-wrap:wrap; gap:14px; justify-content:center; margin-top:12px; }
  .profile-card {
    width:140px; padding:16px 10px 14px; border-radius:24px; background:#fff;
    box-shadow:0 6px 0 #d9dcf5; border:3px solid #eceef9; cursor:pointer; text-align:center;
    animation:popIn .4s backwards; transition:transform .15s; font-family:inherit;
  }
  .profile-card:active { transform:scale(.94); }
  .profile-card .av { font-size:52px; display:block; }
  .profile-card .nm { font-weight:700; color:#454a75; font-size:18px; margin-top:4px; display:block; }
  .profile-card .lv { font-size:11px; color:#9aa; margin-top:2px; display:block; line-height:1.5; }
  .profile-card.add { border:3px dashed #b8bce0; background:#f7f8fe; color:#9aa; }
  .avatar-pick { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin:12px 0; }
  .avatar-pick button { font-size:32px; background:#f2f3fb; border:3px solid transparent; border-radius:14px; padding:6px 9px; cursor:pointer; }
  .avatar-pick button.sel { border-color:#5b86e5; background:#e3ecff; transform:scale(1.12); }
  #name-input {
    font-family:inherit; font-size:20px; padding:10px 14px; border-radius:14px;
    border:3px solid #cfd4ff; width:82%; text-align:center; outline:none; color:#454a75;
  }

  /* jogo */
  #level-badge {
    background:linear-gradient(135deg,#a044ff,#6a3093); color:#fff; padding:7px 18px;
    border-radius:999px; font-size:15px; font-weight:700; box-shadow:0 4px 0 #4d2069; margin-bottom:2px;
    text-align:center; max-width:100%;
  }
  #level-badge.practice { background:linear-gradient(135deg,#f7971e,#ffb300); box-shadow:0 4px 0 #c47f12; color:#5d3600; }
  #progress-track { width:80%; max-width:340px; height:16px; background:#e8e9f7; border-radius:999px; margin:8px 0 3px; overflow:hidden; }
  #progress-fill { height:100%; width:0%; background:linear-gradient(90deg,#38ef7d,#11998e); border-radius:999px; transition:width .5s cubic-bezier(.34,1.56,.64,1); }
  .progress-label { font-size:12.5px; color:#9aa; margin-bottom:4px; }

  #question-area { flex:1; width:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; min-height:150px; }
  #prompt-text { font-size:clamp(18px,4.4vw,23px); font-weight:600; color:#454a75; text-align:center; line-height:1.3; }
  #visual-area { display:flex; align-items:center; justify-content:center; flex-wrap:wrap; gap:10px; font-size:clamp(30px,7vw,46px); max-width:100%; }
  .emoji-group { display:flex; flex-wrap:wrap; justify-content:center; gap:3px; max-width:260px; }
  .emoji-item { animation:popIn .4s cubic-bezier(.34,1.56,.64,1) backwards; }
  .emoji-item.gone { opacity:.22; filter:grayscale(1); }
  @keyframes popIn { from { transform:scale(0) rotate(-30deg); } to { transform:scale(1) rotate(0); } }
  .op-sign { font-size:clamp(34px,8vw,52px); font-weight:700; color:#ff5e62; }
  .num-big { font-size:clamp(48px,12vw,72px); font-weight:700; color:#454a75; }
  .big-emoji { font-size:clamp(76px,18vw,110px); animation:popIn .5s cubic-bezier(.34,1.56,.64,1); filter:drop-shadow(0 6px 8px rgba(0,0,0,.15)); }
  .duo-emoji { font-size:clamp(52px,13vw,80px); animation:popIn .5s cubic-bezier(.34,1.56,.64,1); }
  .read-word { font-size:clamp(38px,10vw,58px); font-weight:700; color:#454a75; letter-spacing:4px; animation:popIn .5s; }
  .read-sentence { font-size:clamp(24px,6vw,34px); font-weight:700; color:#454a75; letter-spacing:1px; text-align:center; line-height:1.3; animation:popIn .5s; }

  #speak-again, #lesson-replay {
    background:linear-gradient(135deg,#ffd54f,#ffb300); border:none; cursor:pointer;
    font-family:inherit; font-weight:700; color:#5d3600; font-size:15px;
    padding:8px 18px; border-radius:999px; box-shadow:0 4px 0 #e69100;
  }
  #speak-again:active, #lesson-replay:active { transform:translateY(3px); box-shadow:0 1px 0 #e69100; }
  #lesson-replay { background:linear-gradient(135deg,#90caf9,#5b86e5); color:#fff; box-shadow:0 4px 0 #3f66c4; }
  #lesson-replay:active { box-shadow:0 1px 0 #3f66c4; }

  #answers { width:100%; display:flex; flex-direction:column; align-items:center; gap:10px; padding:8px 0 4px; }
  .opts-row { display:flex; justify-content:center; gap:10px; flex-wrap:wrap; width:100%; }
  .ans-btn {
    min-width:84px; padding:13px 15px; border:none; border-radius:20px;
    font-family:inherit; font-size:clamp(25px,6vw,34px); font-weight:700; color:#fff; cursor:pointer;
    transition:transform .15s; animation:popIn .4s cubic-bezier(.34,1.56,.64,1) backwards;
  }
  .ans-btn:active { transform:scale(.94); }
  .ans-btn.mid-text { font-size:clamp(19px,4.4vw,25px); }
  .ans-btn.small-text { font-size:clamp(14px,3.5vw,18px); min-width:0; width:100%; max-width:420px; text-align:center; }
  .ans-btn.emoji-opt { font-size:clamp(34px,8vw,44px); }
  .ans-c0 { background:linear-gradient(135deg,#ff6b9d,#ee2a7b); box-shadow:0 6px 0 #b81b5c; }
  .ans-c1 { background:linear-gradient(135deg,#48c6ef,#6f86d6); box-shadow:0 6px 0 #4c60ad; }
  .ans-c2 { background:linear-gradient(135deg,#a8e063,#56ab2f); box-shadow:0 6px 0 #3f7f22; }
  .ans-c3 { background:linear-gradient(135deg,#f7971e,#ffd200); box-shadow:0 6px 0 #c47f12; color:#6b4a00; }
  .ans-c4 { background:linear-gradient(135deg,#c471f5,#fa71cd); box-shadow:0 6px 0 #8e44ad; }
  .ans-btn.correct { animation:winPulse .6s; background:linear-gradient(135deg,#38ef7d,#11998e) !important; box-shadow:0 6px 0 #0c6b62 !important; color:#fff !important; }
  @keyframes winPulse { 30% { transform:scale(1.2); } }
  .ans-btn.wrong { animation:shake .5s; opacity:.4; }
  .ans-btn.hint { animation:bump .7s infinite; outline:4px solid #ffd200; }
  @keyframes shake { 20%,60%{transform:translateX(-9px);} 40%,80%{transform:translateX(9px);} }

  /* teclados */
  #typed-display {
    min-width:150px; padding:6px 20px; border-radius:16px; background:#eef0ff;
    color:#454a75; font-size:32px; font-weight:700; text-align:center; letter-spacing:5px; min-height:54px;
  }
  #typed-display.shake { animation:shake .5s; background:#ffe3e3; }
  .hint-text { font-size:15px; color:#a044ff; font-weight:700; min-height:20px; letter-spacing:3px; }
  .keypad { display:grid; grid-template-columns:repeat(3,72px); gap:7px; justify-content:center; }
  .abcpad { display:grid; grid-template-columns:repeat(7,1fr); gap:5px; width:100%; max-width:440px; }
  .key-btn {
    font-family:inherit; font-size:22px; font-weight:700; padding:10px 0; border:none;
    border-radius:13px; background:#fff; color:#454a75; box-shadow:0 4px 0 #d9dcf5; cursor:pointer;
  }
  .abcpad .key-btn { font-size:19px; padding:9px 0; }
  .key-btn:active { transform:translateY(3px); box-shadow:0 1px 0 #d9dcf5; }
  .key-ok  { background:linear-gradient(135deg,#38ef7d,#11998e); color:#fff; box-shadow:0 4px 0 #0c6b62; }
  .key-del { background:#ffe3e3; color:#c0392b; box-shadow:0 4px 0 #e5b3b3; }

  /* montar palavra (fichas) */
  .slots { display:flex; gap:7px; justify-content:center; flex-wrap:wrap; }
  .slot {
    min-width:48px; height:54px; border-radius:13px; background:#eef0ff; border:3px dashed #c3c8f0;
    display:flex; align-items:center; justify-content:center; font-size:24px; font-weight:700; color:#454a75; padding:0 6px;
  }
  .slot.filled { background:linear-gradient(135deg,#a8e063,#56ab2f); border:3px solid transparent; color:#fff; animation:winPulse .4s; }
  .tiles { display:flex; gap:9px; justify-content:center; flex-wrap:wrap; }
  .tile {
    font-family:inherit; font-size:24px; font-weight:700; padding:11px 15px; border:none;
    border-radius:15px; color:#fff; background:linear-gradient(135deg,#48c6ef,#6f86d6);
    box-shadow:0 5px 0 #4c60ad; cursor:pointer; animation:popIn .4s backwards;
  }
  .tile:active { transform:scale(.94); }
  .tile.used { visibility:hidden; }
  .tile.hint { animation:bump .7s infinite; outline:4px solid #ffd200; }
  .tile.shake { animation:shake .4s; }

  /* microfone */
  #mic-btn {
    font-size:42px; width:104px; height:104px; border-radius:50%; border:none; cursor:pointer;
    background:linear-gradient(135deg,#ff6b9d,#ee2a7b); box-shadow:0 7px 0 #b81b5c;
  }
  #mic-btn:active { transform:translateY(4px); box-shadow:0 2px 0 #b81b5c; }
  #mic-btn.listening { animation:pulseMic 1s infinite; background:linear-gradient(135deg,#38ef7d,#11998e); box-shadow:0 7px 0 #0c6b62; }
  @keyframes pulseMic { 50% { transform:scale(1.12); } }
  #mic-heard { font-size:15px; color:#7a7fa8; min-height:22px; text-align:center; }
  .skip-btn {
    background:#eef0ff; border:none; cursor:pointer; font-family:inherit; color:#6a6fa5;
    font-weight:700; font-size:14px; padding:8px 16px; border-radius:999px;
  }

  #feedback { min-height:30px; font-size:20px; font-weight:700; text-align:center; }
  #feedback.good { color:#11998e; animation:pop .4s; }
  #feedback.bad  { color:#ff5e62; animation:pop .4s; }
  .back-btn {
    background:#eef0ff; border:none; cursor:pointer; font-family:inherit; color:#6a6fa5;
    font-weight:600; font-size:15px; padding:9px 18px; border-radius:999px; margin-top:6px;
  }

  /* loja e álbum */
  .grid4 { display:grid; grid-template-columns:repeat(3,1fr); gap:11px; width:100%; max-width:440px; margin-top:10px; }
  @media (min-width:480px) { .grid4 { grid-template-columns:repeat(4,1fr); } }
  .shop-card {
    border-radius:19px; padding:11px 5px 9px; text-align:center; background:#fff;
    box-shadow:0 5px 0 #d9dcf5; border:3px solid #e7e9f7;
    display:flex; flex-direction:column; gap:3px; align-items:center;
    animation:popIn .4s backwards; position:relative; overflow:hidden;
  }
  .shop-card .emo { font-size:38px; }
  .shop-card .nm { font-size:11.5px; font-weight:700; color:#454a75; line-height:1.1; }
  .shop-card .rar { font-size:9.5px; font-weight:700; padding:2px 8px; border-radius:99px; color:#fff; }
  .rar-comum { background:#90a4ae; } .rar-raro { background:#42a5f5; }
  .rar-epico { background:#ab47bc; } .rar-lendario { background:linear-gradient(90deg,#f7971e,#ffd200); color:#6b4a00; }
  .shop-card.r-raro { border-color:#a9d4fb; }
  .shop-card.r-epico { border-color:#d6a6e8; background:linear-gradient(160deg,#fff,#faf3ff); }
  .shop-card.r-lendario { border-color:#ffd200; background:linear-gradient(160deg,#fffbe6,#fff3bf); }
  .shop-card.locked-card .emo { filter:grayscale(1); opacity:.45; }
  .buy-btn {
    font-family:inherit; border:none; border-radius:99px; padding:5px 11px; font-size:12.5px;
    font-weight:700; cursor:pointer; background:linear-gradient(135deg,#ffd54f,#ffb300);
    color:#5d3600; box-shadow:0 3px 0 #e69100; margin-top:2px;
  }
  .buy-btn:active { transform:translateY(2px); box-shadow:0 1px 0 #e69100; }
  .buy-btn:disabled { filter:grayscale(1); opacity:.5; cursor:default; }
  .owned-tag { font-size:12.5px; font-weight:700; color:#11998e; margin-top:2px; }
  .shine { position:absolute; top:0; left:-80%; width:55%; height:100%; background:linear-gradient(120deg,transparent,rgba(255,255,255,.85),transparent); animation:shine 2.6s infinite; pointer-events:none; }
  @keyframes shine { to { left:135%; } }

  /* jornada */
  .jtabs { display:flex; gap:8px; margin:6px 0 4px; }
  .jtab { border:none; border-radius:99px; padding:9px 16px; font-family:inherit; font-weight:700; background:#eef0ff; color:#6a6fa5; cursor:pointer; font-size:14.5px; }
  .jtab.sel { background:linear-gradient(135deg,#c471f5,#a044ff); color:#fff; box-shadow:0 3px 0 #6a3093; }
  .j-list { width:100%; max-width:430px; display:flex; flex-direction:column; gap:6px; margin-top:6px; }
  .j-item {
    display:flex; gap:9px; align-items:center; font-size:14px; color:#666b90; padding:9px 13px;
    border:none; border-radius:14px; background:#f6f7fd; font-family:inherit; font-weight:600;
    cursor:pointer; text-align:left; width:100%;
  }
  .j-item .jn { width:26px; height:26px; border-radius:50%; background:#dfe2f5; color:#666b90; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex:none; }
  .j-item .jt { flex:1; }
  .j-item .js { font-size:12px; font-weight:700; flex:none; }
  .j-item.done { background:#e9fbf3; color:#11998e; }
  .j-item.done .jn { background:#38ef7d; color:#fff; }
  .j-item.now { background:#f3e9ff; color:#a044ff; box-shadow:0 3px 0 #d6a6e8; }
  .j-item.now .jn { background:#a044ff; color:#fff; }
  .j-item.lock { opacity:.5; cursor:default; }

  /* overlay */
  #overlay {
    position:absolute; inset:0; background:rgba(40,20,80,.55); z-index:50;
    display:none; align-items:center; justify-content:center; backdrop-filter:blur(3px);
  }
  #overlay.show { display:flex; }
  #overlay-card {
    background:#fff; border-radius:28px; padding:26px 24px; text-align:center;
    width:min(420px,90%); max-height:88%; overflow-y:auto;
    animation:pop .5s cubic-bezier(.34,1.56,.64,1); box-shadow:0 20px 50px rgba(0,0,0,.35);
  }
  #overlay-card .big { font-size:74px; animation:mascotJump 1.4s infinite; display:inline-block; }
  #overlay-card h2 { color:#454a75; font-size:25px; margin:8px 0 6px; }
  #overlay-card p { color:#7a7fa8; font-size:16px; margin-bottom:14px; }
  .ov-btn {
    background:linear-gradient(135deg,#38ef7d,#11998e); color:#fff; border:none;
    font-family:inherit; font-size:19px; font-weight:700; padding:12px 30px;
    border-radius:999px; box-shadow:0 5px 0 #0c6b62; cursor:pointer; margin:3px;
  }
  .ov-btn:active { transform:translateY(3px); box-shadow:0 1px 0 #0c6b62; }
  .ov-btn.alt { background:linear-gradient(135deg,#f7971e,#ffd200); color:#5d3600; box-shadow:0 5px 0 #c47f12; }

  .confetti { position:absolute; width:12px; height:12px; z-index:60; top:-20px; animation:confFall linear forwards; pointer-events:none; }
  @keyframes confFall { to { transform:translateY(110vh) rotate(720deg); opacity:.8; } }

  #parents-card { text-align:left; }
  #parents-card h3 { color:#5b86e5; margin:12px 0 4px; font-size:16.5px; }
  #parents-card p, #parents-card li, #parents-card td, #parents-card th { color:#666b90; font-size:13.5px; line-height:1.5; user-select:text; }
  #parents-card ul { padding-left:20px; }
  #parents-card table { width:100%; border-collapse:collapse; margin:6px 0; }
  #parents-card td, #parents-card th { border-bottom:1px solid #e7e9f7; padding:4px 6px; text-align:center; }
  #parents-card th { color:#454a75; }

  /* =============== AULINHA DA PROFESSORA =============== */
  #screen-lesson { justify-content:flex-start; padding-top:18px; }
  #lesson-head { display:flex; align-items:center; gap:12px; margin-bottom:8px; }
  #lesson-teacher { font-size:56px; animation:mascotJump 2.2s infinite; }
  #lesson-title { text-align:left; }
  #lesson-title b { display:block; color:#454a75; font-size:19px; }
  #lesson-title small { color:#7a7fa8; font-size:13px; }
  #lesson-stage {
    width:min(560px,94vw); min-height:200px; background:#fff; border-radius:24px;
    box-shadow:0 6px 0 #d8dcf0; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:10px; padding:20px 14px; margin-bottom:10px;
  }
  #lesson-caption { color:#666b90; font-size:16.5px; font-weight:700; min-height:44px;
    width:min(560px,94vw); text-align:center; line-height:1.35; }
  #lesson-dots { display:flex; gap:7px; margin:6px 0 10px; }

let audioCtx = null;
function tone(freq, dur, delay, type, vol){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = type||"sine"; o.frequency.value = freq;
    g.gain.setValueAtTime(0, audioCtx.currentTime+delay);
    g.gain.linearRampToValueAtTime(vol||.18, audioCtx.currentTime+delay+.02);
    g.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime+delay+dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(audioCtx.currentTime+delay); o.stop(audioCtx.currentTime+delay+dur+.05);
  }catch(e){}
}

let voices = [], ptVoice = null, enVoice = null, deVoice = null;
function loadVoices(){
  voices = speechSynthesis.getVoices();
  ptVoice = voices.find(v=>v.lang==="pt-BR" && /google/i.test(v.name))
         || voices.find(v=>v.lang==="pt-BR")
         || voices.find(v=>v.lang.startsWith("pt")) || null;
  enVoice = voices.find(v=>v.lang==="en-US" && /google/i.test(v.name))
         || voices.find(v=>v.lang==="en-US")
         || voices.find(v=>v.lang.startsWith("en")) || null;
  deVoice = voices.find(v=>v.lang==="de-DE" && /google/i.test(v.name))
         || voices.find(v=>v.lang==="de-DE")
         || voices.find(v=>v.lang.startsWith("de")) || null;
}
if("speechSynthesis" in window){ loadVoices(); speechSynthesis.onvoiceschanged = loadVoices; }

/* speak("texto") ou speak([{t:"Encontre",lang:"pt-BR"},{t:"RED!",lang:"en-US"}], cb) */
function speak(parts, cb){
  if(typeof parts === "string") parts = [{t:parts, lang:"pt-BR"}];
  const list = (parts||[]).filter(p=>p && p.t);
  let called = false;
  const fire = ()=>{ if(!called){ called = true; if(cb) cb(); } };
  if(!("speechSynthesis" in window) || !list.length){ fire(); return; }
  speechSynthesis.cancel();
  list.forEach((p,i)=>{
    const u = new SpeechSynthesisUtterance(p.t);
    u.lang = p.lang || "pt-BR";
    if(u.lang.startsWith("en")){ if(enVoice) u.voice = enVoice; u.rate = .85; }
    else if(u.lang.startsWith("de")){ if(deVoice) u.voice = deVoice; u.rate = .82; }
    else { if(ptVoice) u.voice = ptVoice; u.rate = .92; }
    u.pitch = 1.15;
    if(i===list.length-1){ u.onend = fire; u.onerror = fire; }
    speechSynthesis.speak(u);
  });
  /* segurança: se a voz travar, o jogo continua mesmo assim.
     No celular a voz demora a começar e fala devagar — então NUNCA dispara o
     callback enquanto ainda estiver falando (senão o próximo áudio corta este). */
  if(cb){
    const est = Math.min(list.reduce((s,p)=>s+Math.max(1300, p.t.length*95), 600), 9000);
    const t0 = Date.now();
    const check = ()=>{
      if(called) return;
      if((speechSynthesis.speaking || speechSynthesis.pending) && Date.now()-t0 < est+15000) setTimeout(check, 300);
      else fire();
    };
    setTimeout(check, est);
  }
}

const SAVE_KEY = "aventura-abc123-v2";
let db = { activeIdx:-1, profiles:[] };

function freshTrackState(){ return { lv:{pt:1,math:1,en:1,de:1}, prog:{pt:0,math:0,en:0,de:0},
  stats:{ pt:{a:0,e:0}, math:{a:0,e:0}, en:{a:0,e:0}, de:{a:0,e:0} } }; }

function newProfile(name, avatar){
  const t = freshTrackState();
  return { name, avatar, coins:0, stickers:[], lv:t.lv, prog:t.prog, stats:t.stats, mast:{}, pv:3, rq:{pt:[],math:[],en:[],de:[]}, deep:{pt:0,math:0,en:0,de:0}, les:{pt:0,math:0,en:0,de:0} };
}

function migrateProfile(p){
  if(p.lv && p.prog && p.stats) {
    if(!p.stats.en) p.stats.en = {a:0,e:0};
    if(!p.lv.en) p.lv.en = 1;
    if(p.prog.en==null) p.prog.en = 0;
    if(!p.stats.de) p.stats.de = {a:0,e:0};
    if(!p.lv.de) p.lv.de = 1;
    if(p.prog.de==null) p.prog.de = 0;
    if(p.pv !== 3){
      /* renumerar nível PT da versão de 26 níveis para a trilha Kumon de 36 */
      p.lv.pt = p.lv.pt > 26 ? maxOf("pt") : (PT_REMAP[p.lv.pt] || p.lv.pt);
      p.pv = 3;
    }
    if(!p.mast) p.mast = {};
    if(!p.rq) p.rq = {pt:[],math:[],en:[]};
    if(!p.rq.de) p.rq.de = [];
    /* itens antigos da fila ganham a fase de fundamento */
    TRACK_KEYS.forEach(t=>{ (p.rq[t]||[]).forEach(it=>{ if(it.fleft==null) it.fleft = FUND_HITS; }); });
    if(!p.deep) p.deep = {pt:0,math:0,en:0,de:0};
    TRACK_KEYS.forEach(t=>{ if(p.deep[t]==null) p.deep[t] = 0; });
    if(!p.les) p.les = {pt:0,math:0,en:0,de:0};
    TRACK_KEYS.forEach(t=>{ if(p.les[t]==null) p.les[t] = 0; });
    delete p.redo;
    return p;
  }
  /* formato antigo: {name,avatar,stars,mathLevel,readLevel,stickers} */
  const np = newProfile(p.name||"Jogador", p.avatar||"🦊");
  np.lv.pt   = ({1:3,2:11,3:16})[p.readLevel] || 3;
  np.lv.math = Math.min(Math.max(p.mathLevel||1,1), maxOf("math"));
  np.coins = p.coins||0;
  np.stickers = [];
  return np;
}

function load(){
  try{
    /* lê o save principal; se estiver corrompido/vazio, recupera da cópia de segurança */
    let d = null;
    try{ d = JSON.parse(localStorage.getItem(SAVE_KEY)); }catch(e){}
    if(!d || !Array.isArray(d.profiles) || !d.profiles.length){
      try{
        const bk = JSON.parse(localStorage.getItem(SAVE_KEY+"-bk"));
        if(bk && Array.isArray(bk.profiles) && bk.profiles.length) d = bk;
      }catch(e){}
    }
    if(d){
      db.activeIdx = (d.activeIdx!=null)? d.activeIdx : -1;
      db.profiles = (d.profiles||[]).map(migrateProfile);
    } else {
      /* migrar save v1 (perfil único) se existir */
      const old = localStorage.getItem("aventura-abc123-v1");
      if(old){
        const o = JSON.parse(old);
        const np = newProfile(o.name||"Campeão", "🦁");
        np.lv.pt   = ({1:3,2:11,3:16})[o.readLevel] || 3;
        np.lv.math = Math.min(Math.max(o.mathLevel||1,1), maxOf("math"));
        db.profiles = [np];
      }
    }
  }catch(e){ db = { activeIdx:-1, profiles:[] }; }
  if(db.activeIdx >= db.profiles.length) db.activeIdx = -1;
}
function save(){ try{
  const data = JSON.stringify(db);
  localStorage.setItem(SAVE_KEY, data);
  localStorage.setItem(SAVE_KEY+"-bk", data); /* cópia de segurança: nunca perder progresso */
}catch(e){} }

/* =============== MOTOR DO JOGO =============== */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition || null;
let state = { track:"pt", practice:false, practiceLv:0, q:null, lock:false, reinf:null, lastReinf:false,
              qWrong:0, levelErrors:0, reviewSuggested:false, streak:0, typed:"", micFails:0, rec:null };

/* fila de reforço (Kumon): errou UMA vez → a MESMA questão volta misturada nas
   próximas perguntas (mesmo nível ou seguinte) até acertar 3 vezes; errou de novo, volta pra 3.
   Depois dos 3 acertos, vem a fase de FUNDAMENTO: 2 questões novas da MESMA lição de origem,
   pra provar que entendeu a lógica (não decorou). Só então a lição sai da fila. */
const REINF_HITS = 3, FUND_HITS = 2;
function reinfQ(t){ const p=P(); if(!p.rq) p.rq={pt:[],math:[],en:[],de:[]}; if(!p.rq[t]) p.rq[t]=[]; return p.rq[t]; }
const qKey = q => (q.prompt||"") + "|" + (q.answer || (q.pieces||[]).join("") || (((q.options||[]).find(o=>o.correct))||{}).label || "");

function curLevel(){ const p=P(); return state.practice ? state.practiceLv : Math.min(p.lv[state.track], maxOf(state.track)); }
/* níveis de domínio: meta é dominar 3 palavras (não 5 acertos) */
function deepFrom(t){ const p=P(); return (p && p.deep && p.deep[t]) || 0; }
function isDeep(t, lv){ const d = deepFrom(t); return d > 0 && lv >= d; }
const goalFor = (t,lv) => (t==="pt" && PT_MASTERY[lv]!=null) ? (isDeep(t,lv)?4:3) : (isDeep(t,lv)? GOAL_DEEP : GOAL);

function startGame(track){
  const p = P();
  state.track = track; state.practice = false; state.reinf = null; state.lastReinf = false;
  state.levelErrors = 0; state.reviewSuggested = false; state.streak = 0; state.recent = [];
  if(!p.prog[track]) p.prog[track] = 0;
  const lv = curLevel();
  if(lessonPending(track, lv)){ playLesson(track, lv, beginLevel); return; }
  beginLevel();
}

function beginLevel(){
  const track = state.track;
  showScreen("screen-game");
  updateGameHUD();
  const lv = curLevel();
  speak(`${TRACKS[track].name}! Nível ${lv}: ${TRACKS[track].levels[lv-1].replace(/[🎧🎤👑🏅📖·]/g,"")}. Vamos lá!`, ()=>nextQuestion());
  setTimeout(()=>{ if(!state.q) nextQuestion(); }, 3500);
}

function startPractice(track, lv){
  state.track = track; state.practice = true; state.practiceLv = lv; state.reinf = null; state.lastReinf = false;
  state.levelErrors = 0; state.reviewSuggested = false; state.streak = 0; state.practiceProg = 0; state.recent = [];
  showScreen("screen-game");
  updateGameHUD();
  const g = goalFor(track, lv);
  speak(g===3 ? `Treino do nível ${lv}! Domine ${g} palavras para ganhar moedas extras!`
              : `Treino do nível ${lv}! Acerte ${g} para ganhar moedas extras!`, ()=>nextQuestion());
  setTimeout(()=>{ if(!state.q) nextQuestion(); }, 3500);
}

function updateGameHUD(){
  const p = P(), t = state.track, lv = curLevel();
  const name = TRACKS[t].levels[lv-1] || "Mestre";
  const badge = $("#level-badge");
  badge.textContent = `${TRACKS[t].icon} ${state.practice?"Treino ":""}Nível ${lv} · ${name}${isDeep(t,lv)?" 📚":""}`;
  badge.classList.toggle("practice", state.practice);
  const prog = state.practice ? (state.practiceProg||0) : p.prog[t];
  const goal = goalFor(t, lv);
  const pend = state.practice? 0 : reinfQ(t).length;
  $("#progress-fill").style.width = Math.min(prog/goal*100,100)+"%";
  $("#progress-label").textContent = ((t==="pt" && PT_MASTERY[lv]!=null && !state.practice)
    ? `${prog} de ${goal} palavras dominadas 🏅`
    : `${prog} de ${goal} para ${state.practice?"o bônus":"subir de nível"} ⭐`)
    + (pend? ` · ${pend} reforço${pend>1?"s":""} 🔁` : "");
  updateHUD();
}

function nextQuestion(){
  state.lock = false; state.qWrong = 0; state.typed = ""; state.micFails = 0; state.q = null; state.reinf = null;
  stopMic();
  $("#feedback").textContent = ""; $("#feedback").className = "";
  let q;
  const queue = state.practice? null : reinfQ(state.track);
  /* alterna: 1 questão de reforço, 1 nova — assim a lição errada volta logo, misturada */
  if(queue && queue.length && !state.lastReinf){
    state.reinf = queue[0];
    if(state.reinf.left > 0){ /* fase 1: a MESMA questão */
      q = JSON.parse(JSON.stringify(state.reinf.q));
      if(q.options) q.options = shuffle(q.options);
      q.prompt = "🔁 " + (q.prompt||"");
      q.speech = [ptT("Olha essa de novo!"), ...(q.speech||[])];
    } else { /* fase 2: fundamento — questão nova da MESMA lição de origem */
      q = genFor(state.track, state.reinf.q.flv || curLevel());
      q.prompt = "🔁💡 " + (q.prompt||"");
      q.speech = [ptT("Agora uma parecida! Vamos ver se você pegou o fundamento!"), ...(q.speech||[])];
    }
    state.lastReinf = true;
  } else {
    q = genFor(state.track, curLevel());
    /* 📚 anti-repetição: no modo aprender a base é grande — evita repetir as últimas questões */
    state.recent = state.recent || [];
    let tries = 0;
    while(state.recent.includes(qKey(q)) && tries++ < 8) q = genFor(state.track, curLevel());
    state.lastReinf = false;
  }
  state.recent = state.recent || [];
  state.recent.push(qKey(q));
  if(state.recent.length > 6) state.recent.shift();
  state.q = q;
  renderQ(q);
  updateGameHUD();
  speak(q.speech);
}

function renderQ(q){
  const va = $("#visual-area"), ans = $("#answers");
  $("#prompt-text").textContent = q.prompt || "";
  va.innerHTML = ""; ans.innerHTML = "";

  /* --- visual --- */
  if(q.visual) va.innerHTML = q.visual;

  /* --- respostas --- */
  if(q.kind === "opts"){
    const row = document.createElement("div");
    row.className = "opts-row";
    if(q.stacked) row.style.flexDirection = "column", row.style.alignItems = "center";
    q.options.forEach((op,i)=>{
      const b = document.createElement("button");
      b.className = `ans-btn ans-c${i%5}` + (q.optClass? " "+q.optClass:"");
      b.style.animationDelay = (i*.07)+"s";
      b.innerHTML = op.label;
      b.onclick = ()=>answerOpt(b, op);
      row.appendChild(b);
    });
    ans.appendChild(row);
  }
  else if(q.kind === "keypad" || q.kind === "abc"){
    const disp = document.createElement("div");
    disp.id = "typed-display"; disp.textContent = "";
    ans.appendChild(disp);
    if(q.kind === "abc"){
      const hint = document.createElement("div");
      hint.className = "hint-text";
      hint.id = "letters-hint";
      hint.textContent = "_ ".repeat(q.answer.length).trim();
      ans.appendChild(hint);
    }
    const pad = document.createElement("div");
    pad.className = q.kind === "keypad" ? "keypad" : "abcpad";
    const keys = q.kind === "keypad"
      ? ["1","2","3","4","5","6","7","8","9","⌫","0","✔"]
      : "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").concat(["⌫","✔"]);
    keys.forEach(k=>{
      const b = document.createElement("button");
      b.className = "key-btn" + (k==="✔"?" key-ok":k==="⌫"?" key-del":"");
      b.textContent = k;
      b.onclick = ()=>{
        if(state.lock) return;
        sndTap();
        if(k==="⌫") state.typed = state.typed.slice(0,-1);
        else if(k==="✔"){ checkTyped(); return; }
        else if(state.typed.length < (q.maxLen||8)){
          state.typed += k;
          if(q.kind==="abc") speak([{t:LETTER_SOUND[k]||k, lang:"pt-BR"}]);
        }
        $("#typed-display").textContent = state.typed;
      };
      pad.appendChild(b);
    });
    ans.appendChild(pad);
  }
  else if(q.kind === "tiles"){
    const slots = document.createElement("div"); slots.className = "slots";
    q.pieces.forEach(()=>{ const s=document.createElement("div"); s.className="slot"; slots.appendChild(s); });
    const tiles = document.createElement("div"); tiles.className = "tiles";
    state.tileIdx = 0;
    shuffle(q.pieces.concat(q.decoys||[])).forEach((piece,i)=>{
      const t = document.createElement("button");
      t.className = "tile"; t.textContent = piece;
      t.style.animationDelay = (i*.06)+"s";
      t.onclick = ()=>{
        if(state.lock || t.classList.contains("used")) return;
        const need = q.pieces[state.tileIdx];
        if(piece === need){
          sndTap();
          if(q.sayPieces) speak([{t:piece.toLowerCase(), lang: q.de?"de-DE":q.en?"en-US":"pt-BR"}]);
          t.classList.add("used");
          const slot = slots.children[state.tileIdx];
          slot.textContent = piece; slot.classList.add("filled");
          state.tileIdx++;
          if(state.tileIdx >= q.pieces.length) onCorrect();
        } else {
          t.classList.add("shake");
          setTimeout(()=>t.classList.remove("shake"), 450);
          onWrong();
        }
      };
      tiles.appendChild(t);
    });
    ans.appendChild(slots); ans.appendChild(tiles);
  }
  else if(q.kind === "mic"){
    const mb = document.createElement("button");
    mb.id = "mic-btn"; mb.textContent = "🎤";
    const heard = document.createElement("div");
    heard.id = "mic-heard"; heard.textContent = "Toque no microfone e fale!";
    ans.appendChild(mb); ans.appendChild(heard);
    mb.onclick = ()=>startMic(q, mb, heard);
  }

  $("#speak-again").style.display = q.speech ? "" : "none";
}

function stopMic(){ if(state.rec){ try{ state.rec.abort(); }catch(e){} state.rec = null; } }

/* pede a permissão do microfone ANTES do reconhecimento — senão o prompt de
   "Permitir" cancela a escuta e parece que o botão não funciona */
let micReady = false, micBlock = "";
function ensureMicPermission(){
  if(micReady) return Promise.resolve(true);
  /* aberto por duplo clique (file://) o Chrome/Edge NEGA o microfone sem nem
     mostrar o pedido de permissão — só funciona via http (usar o JOGAR.bat) */
  if(location.protocol === "file:"){ micBlock = "file"; return Promise.resolve(false); }
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){ micReady = true; return Promise.resolve(true); }
  return navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    stream.getTracks().forEach(tr=>tr.stop());
    micReady = true; micBlock = ""; return true;
  }).catch(()=>{ micBlock = "denied"; return false; });
}
function micBlockMsg(){
  return micBlock === "file"
    ? "Peça a um adulto pra abrir o jogo pelo JOGAR.bat — aí o microfone funciona! 🎤"
    : "O microfone está bloqueado 😢 Peça a um adulto: cadeado 🔒 na barra do navegador → Microfone → Permitir!";
}

/* teste de microfone de 1 clique (painel dos pais) — mostra exatamente onde trava */
function micTest(){
  const out = $("#mic-test-out");
  const show = html => { if(out) out.innerHTML = html; };
  if(location.protocol === "file:"){
    show("❌ O jogo está aberto por <b>duplo clique</b> (endereço file://) — o navegador nega o microfone <b>sem nem perguntar</b>.<br>👉 Feche esta janela e abra o jogo pelo <b>JOGAR.bat</b> que está na pasta do jogo.");
    return;
  }
  if(!SR){
    show("❌ Este navegador não tem reconhecimento de voz. Use <b>Chrome</b> ou <b>Edge</b>.");
    return;
  }
  show("⏳ Pedindo permissão… Se aparecer a janelinha do navegador, clique em <b>Permitir</b>!");
  ensureMicPermission().then(ok=>{
    if(!ok){
      show("❌ Permissão negada. Clique no <b>cadeado 🔒</b> (ou no ícone 🎤) na barra de endereço → Microfone → <b>Permitir</b> → recarregue a página e teste de novo.");
      return;
    }
    show("🎙️ Permissão OK! Agora <b>fale qualquer coisa</b>… (estou ouvindo)");
    try{
      const rec = new SR();
      rec.lang = "pt-BR"; rec.interimResults = false; rec.maxAlternatives = 3;
      let done = false;
      const finish = msg => { if(done) return; done = true; try{ rec.stop(); }catch(e){} show(msg); };
      rec.onresult = ev => finish(`✅ <b>Microfone funcionando!</b> Eu ouvi: “${ev.results[0][0].transcript}” 🎉<br>Os níveis 🎤 do jogo vão funcionar.`);
      rec.onerror = ev => finish(
        ev.error==="not-allowed" ? "❌ O navegador bloqueou. Cadeado 🔒 → Microfone → <b>Permitir</b> → recarregue a página."
        : ev.error==="network" ? "❌ O serviço de voz não respondeu — o reconhecimento precisa de <b>internet</b>. Verifique a conexão."
        : ev.error==="no-speech" ? "⚠️ Não ouvi nada. Fale mais perto do microfone e toque em Testar de novo."
        : ev.error==="audio-capture" ? "❌ Nenhum microfone encontrado. Conecte/ative um microfone no Windows (Configurações → Sistema → Som)."
        : "❌ Erro: "+ev.error);
      rec.onend = ()=> finish("⚠️ Não ouvi nada. Verifique se o microfone certo está escolhido no Windows (Configurações → Sistema → Som → Entrada) e teste de novo.");
      rec.start();
      setTimeout(()=>finish("⚠️ Tempo esgotado sem ouvir nada. Verifique o microfone do Windows e teste de novo."), 8000);
    }catch(e){ show("❌ Erro ao iniciar o reconhecimento: "+e.message); }
  });
}

/* números falados: o reconhecedor às vezes devolve o dígito ("9") e às vezes a
   palavra ("nine"/"nove"/"neun") — aceitamos os dois. Formas já sem acento (norm). */
const NUM_SPOKEN = [
  ["zero","null"],["um","uma","one","eins"],["dois","duas","two","zwei"],["tres","three","drei"],
  ["quatro","four","vier"],["cinco","five","funf"],["seis","six","sechs"],["sete","seven","sieben"],
  ["oito","eight","acht"],["nove","nine","neun"],["dez","ten","zehn"],["onze","eleven","elf"],
  ["doze","twelve","zwolf"],["treze","thirteen","dreizehn"],["catorze","quatorze","fourteen","vierzehn"],
  ["quinze","fifteen","funfzehn"],["dezesseis","sixteen","sechzehn"],["dezessete","seventeen","siebzehn"],
  ["dezoito","eighteen","achtzehn"],["dezenove","nineteen","neunzehn"],["vinte","twenty","zwanzig"]
];
function numAlts(t){
  const out = [t];
  if(/^\d+$/.test(t)){ const r = NUM_SPOKEN[+t]; if(r) out.push(...r); }
  else { const ix = NUM_SPOKEN.findIndex(r=>r.includes(t)); if(ix > -1) out.push(String(ix)); }
  return out;
}
/* compara o que foi ouvido com a resposta (e alternativas aceitas, ex.: "7" pra SEVEN).
   Compara palavra por palavra — "19" NÃO pode valer como "9"! */
function micMatch(alts, q){
  const targets = [q.answer].concat(q.accept||[]).map(norm).flatMap(numAlts);
  return alts.some(raw=>{
    const a = raw.replace(/[.,!?;:]/g," ").replace(/\s+/g," ").trim();
    const toks = a.split(" ");
    return targets.some(t =>
      a === t || toks.includes(t) ||
      (t.includes(" ") && a.includes(t)) ||  /* alvo de várias palavras dentro da frase: "red cat" */
      t.replace(/\s/g,"") === a.replace(/\s/g,"") /* soletrado ou colado: "ga to"→"gato", "redcat"→"red cat" */
    );
  });
}

function startMic(q, mb, heard){
  if(state.lock) return;
  stopMic();
  heard.textContent = "Preparando o microfone...";
  ensureMicPermission().then(allowed=>{
    if(state.lock) return;
    if(!allowed){
      mb.classList.remove("listening");
      heard.textContent = micBlockMsg();
      showMicSkip("👉 Pular esta palavra");
      return;
    }
    const rec = new SR();
    state.rec = rec;
    rec.lang = q.de ? "de-DE" : q.en ? "en-US" : "pt-BR";
    rec.interimResults = false; rec.maxAlternatives = 5;
    mb.classList.add("listening");
    heard.textContent = "Estou ouvindo... fale agora!";
    speechSynthesis.cancel();
    let got = false;
    rec.onresult = ev=>{
      got = true;
      const alts = [...ev.results].flatMap(res=>[...res].map(r=>norm(r.transcript)));
      heard.textContent = `Ouvi: "${ev.results[0][0].transcript}"`;
      const ok = micMatch(alts, q);
      if(ok){ mb.classList.remove("listening"); onCorrect(); }
      else {
        mb.classList.remove("listening");
        state.micFails++;
        onWrong();
        if(state.micFails >= 2) showMicSkip();
      }
    };
    rec.onerror = ev=>{
      mb.classList.remove("listening");
      if(got) return;
      const err = ev && ev.error;
      if(err==="not-allowed" || err==="service-not-allowed"){
        micReady = false; if(!micBlock) micBlock = "denied";
        heard.textContent = micBlockMsg();
        showMicSkip("👉 Pular esta palavra");
      } else if(err==="network"){
        heard.textContent = "O microfone precisa de internet 😢 Pule esta palavra!";
        showMicSkip("👉 Pular esta palavra");
      } else if(err==="no-speech"){
        heard.textContent = "Não ouvi nada... toque no microfone e fale bem alto!";
      } else {
        heard.textContent = "Não deu certo... toque e tente de novo!";
        state.micFails++;
        if(state.micFails >= 2) showMicSkip();
      }
    };
    rec.onend = ()=>{ mb.classList.remove("listening"); if(!got && heard.textContent.startsWith("Estou")) heard.textContent = "Não ouvi... toque e tente de novo!"; };
    try{ rec.start(); }catch(e){ heard.textContent = "Microfone indisponível 😢"; showMicSkip("👉 Pular esta palavra"); }
  });
}

/* ---- responder ---- */
function answerOpt(btn, op){
  if(state.lock) return;
  if(op.correct){
    btn.classList.add("correct");
    onCorrect();
  } else {
    btn.classList.add("wrong");
    btn.disabled = true;
    onWrong(op.say);
  }
}

function checkTyped(){
  if(state.lock) return;
  const q = state.q;
  if(!state.typed) return;
  if(norm(state.typed) === norm(q.answer)){
    onCorrect();
  } else {
    const d = $("#typed-display");
    d.classList.add("shake");
    setTimeout(()=>{ d.classList.remove("shake"); }, 550);
    state.typed = ""; d.textContent = "";
    onWrong();
  }
}

/* ---- acerto / erro ---- */
function onCorrect(){
  state.lock = true;
  stopMic();
  const p = P(), t = state.track, lv = curLevel(), q = state.q;
  sndCorrect(); confetti(14);
  let coins = coinFor(lv, q.kind);
  if(state.qWrong > 0) coins = Math.max(2, Math.round(coins/2));
  let extra = 0;
  if(state.qWrong === 0){
    state.streak++;
    if(state.streak % 5 === 0){ extra = STREAK_BONUS; confetti(20); }
  } else state.streak = 0;
  /* questão de reforço: não conta no progresso do nível.
     Fase 1 (left): repetir a MESMA questão 3x. Fase 2 (fleft): 2 questões novas do
     mesmo fundamento. Errou → a fase atual recomeça. Só sai da fila com as duas completas. */
  let reinfGone = false, fundNow = false;
  if(state.reinf){
    const queue = reinfQ(t), it = state.reinf;
    const inFund = it.left <= 0;
    if(state.qWrong > 0){
      if(inFund) it.fleft = FUND_HITS;           /* errou o fundamento → recomeça a fase 2 */
      else it.left = REINF_HITS;                 /* errou de novo → mais 3 vezes */
    } else if(inFund) it.fleft--;
    else { it.left--; if(it.left === 0) fundNow = true; }
    const ix = queue.indexOf(it);
    if(ix > -1) queue.splice(ix, 1);
    if(it.left > 0 || it.fleft > 0) queue.push(it); /* volta pro fim da fila, misturada */
    else { reinfGone = true; extra += 15; confetti(24); }
  }
  /* domínio de palavra (Kumon): a mesma palavra repete até ser dominada */
  let masteredNow = false, step = !state.reinf;
  const deepDirty = !state.reinf && state.qWrong > 0 && isDeep(t, lv);
  if(deepDirty) step = false; /* modo aprender: só acerto limpo conta pro progresso */
  if(q.mword && !state.reinf){
    const m = (p.mast[q.mword]||0) + 1;
    p.mast[q.mword] = Math.min(m, MASTERY);
    masteredNow = m >= MASTERY;
    step = masteredNow;
    if(masteredNow){ extra += 10; confetti(24); }
  }
  p.coins += coins + extra;
  p.stats[t].a++;
  const fb = $("#feedback");
  fb.className = "good";
  fb.textContent = reinfGone
    ? `🔁✨ Pegou de vez! Lição e fundamento! +${coins+extra} moedas!`
    : fundNow
    ? `🔁💡 Agora vem o fundamento! +${coins+extra} moedas!`
    : masteredNow
    ? `🏅 Palavra dominada! +${coins+extra} moedas!`
    : deepDirty
    ? `💛 +${coins+extra} moedas! Essa volta pra contar de novo!`
    : `${pick(["🎉","⭐","🌈","💪","🏅"])} +${coins+extra} moedas!` + (extra?` (${state.streak} seguidas! 🔥)`:"");
  coinBump(); updateHUD();

  const goal = goalFor(t, lv);
  let done = false;
  if(state.practice){
    if(step) state.practiceProg = (state.practiceProg||0)+1;
    if(state.practiceProg >= goal) done = "practice";
  } else if(step){
    p.prog[t]++;
    if(p.prog[t] >= goal) done = "levelup";
  }
  save(); updateGameHUD();

  const praise = reinfGone ? "Agora você pegou essa lição de vez! Entendeu o fundamento! Muito bem!"
               : fundNow ? "Boa! Agora vamos ver umas parecidas, pra ter certeza que você entendeu o porquê!"
               : masteredNow ? `Você dominou a palavra ${q.mword}! Incrível!` : pick(PRAISE);
  const okSpeech = q.okSpeech || null;
  const after = ()=>{
    if(done === "levelup") levelUp();
    else if(done === "practice") practiceDone();
    else setTimeout(()=>nextQuestion(), 350);
  };
  if(okSpeech) speak([...(Array.isArray(okSpeech)?okSpeech:[ptT(okSpeech)]), ptT(praise)], after);
  else speak(praise, after);
}

function onWrong(said){
  const p = P(), t = state.track, q = state.q;
  state.qWrong++; state.levelErrors++; state.streak = 0;
  p.stats[t].e++;
  /* errou 1 vez → a MESMA questão entra na fila de reforço (3 acertos + 2 de fundamento pra sair) */
  if(state.qWrong === 1 && !state.practice && !state.reinf){
    const queue = reinfQ(t), k = qKey(q);
    const ex = queue.find(it=>it.k===k);
    if(ex){ ex.left = REINF_HITS; ex.fleft = FUND_HITS; }
    else queue.push({ k, left: REINF_HITS, fleft: FUND_HITS, q: JSON.parse(JSON.stringify(q)) });
  }
  /* errou uma questão de reforço → a fase atual recomeça e ela vai pro FIM da fila (volta misturada) */
  if(state.reinf && state.qWrong === 1){
    if(state.reinf.left <= 0) state.reinf.fleft = FUND_HITS;
    else state.reinf.left = REINF_HITS;
    const queue = reinfQ(t), ix = queue.indexOf(state.reinf);
    if(ix > -1){ queue.splice(ix, 1); queue.push(state.reinf); }
  }
  /* 📚 primeiro erro na questão marca o nível REAL da criança (a partir do nível 3):
     daí pra cima destrava a base completa — modo aprender de verdade */
  if(!state.practice && state.qWrong === 1){
    const lvSrc = q.flv || curLevel();
    if(lvSrc >= DEEP_MIN && (!p.deep[t] || lvSrc < p.deep[t])){
      const first = !p.deep[t];
      p.deep[t] = lvSrc;
      if(first) setTimeout(()=>speak("Opa! Agora eu descobri o que você vai aprender! Daqui pra frente vamos conhecer TUDO: mais bichos, mais cores, mais números! Vamos nessa!"), 2500);
    }
  }
  save();
  sndWrong();
  const fb = $("#feedback");
  fb.className = "bad";
  if(q.kind === "mic"){
    /* microfone pode ter ouvido errado — aqui vale tentar de novo (e tem botão pular) */
    fb.textContent = "Ops! Tente de novo! 💛";
    const enc = pick(ENCOURAGE);
    if(state.qWrong >= 2) speak([ptT(enc), ...(q.hintSpeech? [q.hintSpeech]:[])]);
    else speak(enc);
  } else {
    /* errou → NÃO fica na mesma pergunta (senão dá pra ir eliminando as opções!):
       mostra e fala a resposta certa e SEGUE pra outra — a errada volta misturada na fila 🔁 */
    state.lock = true;
    fb.textContent = pick(["Ops! Essa volta depois! 💛","Quase! Vamos pra outra! 💛","Tudo bem errar! Ela volta já, já! 💛"]);
    [...document.querySelectorAll(".ans-btn")].forEach((b,i)=>{
      b.classList.toggle("hint", !!(q.options && q.options[i] && q.options[i].correct));
    });
    const parts = [];
    if(said) parts.push(ptT("Ops! Essa é"), {t: said.t + "!", lang: said.lang});
    const co = q.options && q.options.find(o=>o.correct);
    if(co && co.say) parts.push(ptT("A certa era"), {t: co.say.t + "!", lang: co.say.lang});
    else if(q.answer != null){
      parts.push(ptT("A resposta certa era"), {t: String(q.answer), lang: q.de?"de-DE":q.en?"en-US":"pt-BR"});
      const d = $("#typed-display"); if(d) d.textContent = String(q.answer);
    }
    else if(q.hintSpeech) parts.push(q.hintSpeech); /* sem resposta explícita: fala só a dica */
    parts.push(ptT(pick(MOVE_ON)));
    /* garante que a PRÓXIMA é uma pergunta nova — a errada só volta depois, misturada */
    state.lastReinf = true;
    speak(parts, ()=> setTimeout(nextQuestion, 700));
  }
  /* muitos erros no nível → sugerir revisão (avaliação do erro) */
  if(!state.practice && state.levelErrors >= 6 && !state.reviewSuggested && curLevel() > 1){
    state.reviewSuggested = true;
    setTimeout(()=>suggestReview(), 1200);
  }
}

function suggestReview(){
  const t = state.track, lv = curLevel();
  showOverlay(`
    <span class="big">🦊</span>
    <h2>Vamos treinar um pouquinho?</h2>
    <p>Este nível está difícil! Que tal treinar o nível anterior para ficar craque? Você ainda ganha moedas! 🪙</p>
    <button class="ov-btn" id="rev-yes">Treinar nível ${lv-1} 💪</button>
    <button class="ov-btn alt" id="rev-no">Continuar aqui</button>`);
  speak("Este nível está difícil, né? Que tal treinar o nível anterior pra ficar craque? Você escolhe!");
  $("#rev-yes").onclick = ()=>{ sndTap(); hideOverlay(); startPractice(t, lv-1); };
  $("#rev-no").onclick = ()=>{ sndTap(); hideOverlay(); speak("Boa! Você é corajoso! Vamos lá!"); };
}

/* ---- subir de nível ---- */
function levelUp(){
  const p = P(), t = state.track;
  const lv = p.lv[t];
  const bonus = levelUpBonus(lv);
  p.coins += bonus;
  p.lv[t] = lv+1;
  p.prog[t] = 0;
  /* sempre passa de nível — as lições erradas seguem misturadas na fila de reforço */
  const pendR = reinfQ(t).length;
  state.levelErrors = 0; state.reviewSuggested = false;
  save();
  sndLevelUp(); confetti(60); coinBump(); updateHUD();
  const mx = maxOf(t);
  if(lv >= mx){
    showOverlay(`
      <span class="big">👑</span>
      <h2>${TRACKS[t].name}: COMPLETO!</h2>
      <p>Você terminou TODOS os ${mx} níveis! Agora o modo Mestre mistura tudo — e dá muitas moedas! +${bonus} 🪙</p>
      <button class="ov-btn" id="lvl-go">Modo Mestre! 👑</button>
      <button class="ov-btn alt" id="lvl-home">Menu</button>`);
    speak(`Parabéns! Você completou toda a trilha de ${TRACKS[t].name}! Você é incrível! Agora vem o modo mestre!`);
  } else {
    const nname = TRACKS[t].levels[p.lv[t]-1].replace(/[🎧🎤👑🏅📖·]/g,"");
    showOverlay(`
      <span class="big">🚀</span>
      <h2>NÍVEL ${p.lv[t]}!</h2>
      <p>Você subiu de nível e ganhou <b>+${bonus} moedas</b> de bônus! 🪙<br>Agora vem: <b>${TRACKS[t].levels[p.lv[t]-1]}</b></p>
      ${pendR? `<p style="color:#e67e22;">🔁 ${pendR===1? "Uma lição de reforço vai junto — ela volta misturada" : `<b>${pendR} lições de reforço</b> vão junto — elas voltam misturadas`} até você pegar de vez!</p>` : ""}
      <button class="ov-btn" id="lvl-go">Continuar! 🚀</button>
      <button class="ov-btn alt" id="lvl-home">Menu</button>`);
    speak(`Uau! Você subiu para o nível ${p.lv[t]}! Ganhou ${bonus} moedas de bônus! Agora vamos aprender: ${nname}!`);
  }
  $("#lvl-go").onclick = ()=>{
    sndTap(); hideOverlay();
    const nlv = curLevel();
    if(!state.practice && lessonPending(t, nlv)){
      playLesson(t, nlv, ()=>{ showScreen("screen-game"); updateGameHUD(); nextQuestion(); });
    } else { updateGameHUD(); nextQuestion(); }
  };
  $("#lvl-home").onclick = ()=>{ sndTap(); hideOverlay(); goHome(); };
}

function practiceDone(){
  const p = P();
  p.coins += PRACTICE_BONUS;
  save(); coinBump(); updateHUD(); confetti(35); sndLevelUp();
  showOverlay(`
    <span class="big">💪</span>
    <h2>Treino completo!</h2>
    <p>Você ganhou <b>+${PRACTICE_BONUS} moedas</b> de bônus do treino! 🪙</p>
    <button class="ov-btn" id="pr-again">Treinar de novo 🔁</button>
    <button class="ov-btn alt" id="pr-back">Jornada 🗺️</button>`);
  speak(`Treino completo! Mais ${PRACTICE_BONUS} moedas pra você! Quanto mais treina, mais craque fica!`);
  $("#pr-again").onclick = ()=>{ sndTap(); hideOverlay(); startPractice(state.track, state.practiceLv); };
  $("#pr-back").onclick = ()=>{ sndTap(); hideOverlay(); openJourney(state.track); };
}

/* =============== AULINHA DA PROFESSORA 📺 =============== */
/* Método Kumon/fônico: cada nível ensina UM conceito — a aula modela o
   raciocínio em voz alta (eu faço → nós fazemos → você faz) antes da prática. */

const sc = (v,t,s) => ({v,t,s});
const lsE = (e,d) => `<span class="ls-emoji ls-pop"${d?` style="animation-delay:${d}s"`:""}>${e}</span>`;
const lsB = (txt,cls) => `<div class="ls-big ls-pop ${cls||""}">${txt}</div>`;
const lsRow = inner => `<div class="ls-row">${inner}</div>`;
const lsTiles = (arr,cls,step) => lsRow(arr.map((x,i)=>`<span class="ls-tile ${cls||""} ls-pop" style="animation-delay:${i*(step||.45)}s">${x}</span>`).join(""));
const lsCount = (n,e,step) => `<div class="ls-row" style="max-width:430px;">${Array.from({length:n},(_,i)=>`<span class="ls-emoji ls-pop" style="animation-delay:${i*(step||.55)}s;font-size:clamp(28px,8vw,44px);">${e}</span>`).join("")}</div>`;
const lsWord = (w,e) => lsRow(lsB(w)+lsE(e,.5));
const lsMerge = (a,b) => `<div class="ls-row ls-merge"><span class="ls-tile ls-pop">${a}</span><span class="ls-tile ls-pop" style="animation-delay:.4s">${b}</span></div>`;
const lsHl = (w,i0,i1) => lsB(w.slice(0,i0)+`<span class="ls-hl">${w.slice(i0,i1)}</span>`+w.slice(i1));
const lsSum = (a,b,e,e2) => lsRow(lsCount(a,e,.4)+lsB("+","ls-pulse")+lsCount(b,e2||e,.4));

function lessonFor(track, lv){
  if(lv > maxOf(track)) return null;
  const scenes = track==="pt"? ptLesson(lv) : track==="math"? mathLesson(lv) : langLesson(track, lv);
  return scenes && scenes.length? { scenes } : null;
}

      sc(lsRow(lsHl("OVO",0,1)+lsE("🥚",.5)), "Que som começa a palavra?", "OVO começa com Ó! ÓÓÓ-VO! Escute o comecinho da palavra e ache a vogal!")];
    case 5: return [

function playLesson(track, lv, after){
  const Lz = lessonFor(track, lv);
  if(!Lz){ if(after) after(); return; }
  stopMic();
  lesson = { L:Lz, track, lv, ix:0, gen:0, after };
  $("#lesson-name").textContent = "Aula: " + (TRACKS[track].levels[lv-1]||"").replace(/[🎧🎤👑🏅📖]/g,"").trim();
  $("#lesson-sub").textContent = `${TRACKS[track].icon} ${TRACKS[track].name} · Nível ${lv} · Professora Corujinha`;
  $("#lesson-dots").innerHTML = Lz.scenes.map(()=>"<span></span>").join("");
  showScreen("screen-lesson");
  lessonScene();
}
function lessonScene(){
  const scn = lesson.L.scenes[lesson.ix], gen = ++lesson.gen;
  [...$("#lesson-dots").children].forEach((d,i)=>d.classList.toggle("on", i===lesson.ix));
  $("#lesson-stage").innerHTML = scn.v || "";
  $("#lesson-caption").textContent = scn.t || "";
  $("#lesson-next").textContent = lesson.ix >= lesson.L.scenes.length-1 ? "🚀 Vamos jogar!" : "▶ Continuar";
  speak(scn.s, ()=>{ if(lesson && lesson.gen===gen) setTimeout(()=>{ if(lesson && lesson.gen===gen) lessonNext(); }, 1200); });
}
function lessonNext(){
  if(!lesson) return;
  if(lesson.ix >= lesson.L.scenes.length-1) return lessonDone();
  lesson.ix++; lessonScene();
}
function lessonDone(){
  const l = lesson; lesson = null;
  if("speechSynthesis" in window) speechSynthesis.cancel();
  const p = P();
  if(p){ p.les = p.les || {pt:0,math:0,en:0,de:0}; p.les[l.track] = Math.max(p.les[l.track]||0, l.lv); save(); }
  if(l.after) l.after();
}
/* aula automática só na 1ª vez que a criança chega no nível */
function lessonPending(track, lv){
  const p = P();
  return lv <= maxOf(track) && ((p.les||{})[track]||0) < lv && !!lessonFor(track, lv);
}

/* =============== GERADORES DE PERGUNTAS =============== */
function genFor(track, lv){
  let q;
  if(track==="pt") q = genPt(lv);
  else if(track==="math") q = genMath(lv);
  else if(track==="de") q = genDe(lv);
  else q = genEn(lv);
  q.flv = lv; /* lição de origem = fundamento (cada nível Kumon ensina UMA coisa) */
  return q;
}

/* opções: alvo + distratores do mesmo grupo */
function makeOpts(correct, pool, n, labelFn){
  const others = shuffle(pool.filter(x=>x!==correct)).slice(0, n-1);
  return shuffle([correct, ...others]).map(x=>({ label: labelFn? labelFn(x): x, correct: x===correct }));
}

function letterQ(letters, nOpts){
  const L = pick(letters);
  return {
    kind:"opts", prompt:"Qual é a letra?",
    visual:`<span class="big-emoji" style="font-size:clamp(40px,10vw,60px);">🔤</span>`,
    speech:[ptT(`Encontre a letra ${LETTER_SOUND[L]||L}!`)],
    hintSpeech: ptT(`Procure a letra ${LETTER_SOUND[L]||L}.`),
    okSpeech:`${LETTER_SOUND[L]||L}!`,
    options: makeOpts(L, letters, nOpts)
  };
}

/* 7A do Kumon: ouvir a palavra e apontar a figura (antes de ler) */
function genListenWord(n){
  const pool = n===3 ? WORDS : WORDS.concat(WORDS_BIG);
  const w = pick(pool);
  return {
    kind:"opts", prompt:"Escute e toque na figura!",
    visual:`<span class="big-emoji">👂</span>`,
    speech:[ptT(`Encontre: ${w.w}!`)],
    hintSpeech: ptT(`${w.w}! ${w.w}!`),
    okSpeech:`${w.w}!`,
    optClass:"emoji-opt",
    options: makeOpts(w, pool, n, x=>x.e)
  };
}

/* Domínio Kumon: a MESMA palavra repete 3 vezes, cada vez mais difícil */
function genMastery(gi){
  const list = WORD_GRADES[gi];
  const focus = list.find(x=>(P().mast[x.w]||0) < MASTERY);
  if(!focus){ /* todas dominadas → revisão: ler e achar a figura */
    const w = pick(list);
    return {
      kind:"opts", prompt:"Revisão! Leia e ache a figura!",
      visual:`<div class="read-word" style="font-size:clamp(26px,6.5vw,40px);">${w.w}</div>`,
      speech:[ptT("Você já dominou todas! Leia e toque na figura!")],
      hintSpeech: ptT(`${(w.syl||[w.w]).join("... ")}...`),
      okSpeech:`${w.w}!`,
      optClass:"emoji-opt",
      options: makeOpts(w, list, Math.min(5,list.length), x=>x.e)
    };
  }
  const rep = P().mast[focus.w]||0;
  const syl = focus.syl || [focus.w];
  if(rep===0){ /* 1º encontro: ouvir + ver a palavra */
    return {
      kind:"opts", prompt:"Palavra nova! Escute e ache a figura!",
      visual:`<div class="read-word" style="font-size:clamp(26px,6.5vw,40px);">${focus.w}</div>`,
      speech:[ptT(`Palavra nova: ${focus.w}! ${syl.join("... ")}... ${focus.w}! Ache a figura!`)],
      hintSpeech: ptT(`${focus.w}! ${syl.join("... ")}!`),
      okSpeech:`${focus.w}!`,
      optClass:"emoji-opt", mword:focus.w,
      options: makeOpts(focus, list, Math.min(3,list.length), x=>x.e)
    };
  }
  if(rep===1){ /* 2º encontro: ler sozinho, sem ajuda de voz */
    return {
      kind:"opts", prompt:"Ela voltou! Agora leia sozinho!",
      visual:`<div class="read-word" style="font-size:clamp(26px,6.5vw,40px);">${focus.w}</div>`,
      speech:[ptT("Essa palavra voltou! Agora leia sozinho e ache a figura!")],
      hintSpeech: ptT(`${syl.join("... ")}...`),
      okSpeech:`${focus.w}!`,
      optClass:"emoji-opt", mword:focus.w,
      options: makeOpts(focus, list, Math.min(5,list.length), x=>x.e)
    };
  }
  /* 3º encontro: montar a palavra → dominada! */
  const pieces = syl.length>=2 ? syl : focus.w.split("");
  const decoys = syl.length>=2
    ? shuffle(Object.values(SYL_FAMILIES).flat().filter(s=>!pieces.includes(s))).slice(0,2)
    : shuffle(AZ.filter(l=>!focus.w.includes(l))).slice(0,2);
  return {
    kind:"tiles", prompt:"Última vez! Monte a palavra e domine ela!",
    visual:`<span class="big-emoji">${focus.e}</span>`,
    speech:[ptT(`Monte a palavra ${focus.w}! ${pieces.join("... ")}!`)],
    hintSpeech: ptT(`${pieces.join("... ")}!`),
    okSpeech:`${focus.w}!`,
    pieces, decoys, sayPieces:true, answer:focus.w, mword:focus.w
  };
}

/* Etapa C do Kumon: ler uma historinha e responder */
function genStory(){
  const s = pick(STORIES);
  return {
    kind:"opts", prompt: s.q,
    visual:`<div class="read-sentence" style="font-size:clamp(17px,4.4vw,24px);">${s.t[0]}<br>${s.t[1]}</div>`,
    speech:[ptT(`Leia a historinha com atenção! Depois responda: ${s.q}`)],
    okSpeech:`Isso mesmo!`,
    optClass:"emoji-opt",
    options: shuffle(s.opts).map(e=>({label:e, correct:e===s.a}))
  };
}

/* despachante da trilha Kumon completa (7A → C) */
function genPt(lv){
  if(lv===1 || lv===2) return genListenWord(lv===1?3:5);
  if(PT_MASTERY[lv]!=null) return genMastery(PT_MASTERY[lv]);
  if(lv===34){ /* ditado difícil */
    const w = pick(DITADO_HARD);
    return {
      kind:"abc", prompt:"Ditado difícil! Escreva o que ouvir!",
      visual:`<span class="big-emoji">🎧</span>`,
      speech:[ptT(`Ditado! Escreva a palavra: ${w}! ${w}!`)],
      okSpeech:`${w}!`,
      answer:w, maxLen:w.length
    };
  }
  if(lv===35) return genStory();
  if(PT_OLD[lv]) return genPtCore(PT_OLD[lv]);
  /* 36+: MESTRE — mistura os desafios da trilha inteira */
  return genPt(pick([16,20,21,24,25,26,27,28,30,32,34,35]));
}

function genPtCore(lv){
  if(lv===1) return letterQ(VOWELS, 3);
  if(lv===2) return letterQ(VOWELS, 5);
  if(lv===3) return letterQ(EASY_CONS, 3);
  if(lv===4) return letterQ(AZ, 5);
  if(lv===5){ /* letras parecidas */
    const g = pick(CONFUSABLE), L = pick(g);
    const q = letterQ(g, Math.min(4,g.length));
    q.prompt = "Cuidado! São parecidas!";
    q.speech = [ptT(`Atenção! Encontre a letra ${LETTER_SOUND[L]||L}!`)];
    q.okSpeech = `${LETTER_SOUND[L]||L}!`;
    q.options = makeOpts(L, g, Math.min(4,g.length));
    q.hintSpeech = ptT(`Olhe bem! É a letra ${LETTER_SOUND[L]||L}.`);
    return q;
  }
  if(lv===6 || lv===7 || lv===8){ /* sílabas */
    const fams = lv===6? ["M"] : lv===7? ["M","P","B"] : Object.keys(SYL_FAMILIES);
    const f = pick(fams);
    const syl = pick(SYL_FAMILIES[f]);
    const pool = lv===6? SYL_FAMILIES[f] : shuffle(fams.flatMap(k=>SYL_FAMILIES[k]));
    return {
      kind:"opts", prompt:"Qual é a sílaba?",
      visual:`<span class="big-emoji" style="font-size:clamp(40px,10vw,60px);">🧩</span>`,
      speech:[ptT(`Encontre a sílaba ${syl}!`)],
      hintSpeech: ptT(`${syl}! ${syl}!`),
      okSpeech:`${syl}!`,
      options: makeOpts(syl, pool, 5)
    };
  }
  if(lv===9 || lv===10){ /* primeira letra: 3 → 5 opções (pedido do papai!) */
    const w = pick(WORDS);
    const first = w.w[0];
    const pool = shuffle(AZ.filter(l=>l!==first)).slice(0, lv===9? 2:4).concat(first);
    return {
      kind:"opts", prompt:`Com que letra começa?`,
      visual:`<span class="big-emoji">${w.e}</span>`,
      speech:[ptT(`Com que letra começa a palavra ${w.w}?`)],
      hintSpeech: ptT(`${w.w}... ${w.w[0]}${w.w[1]}... começa com ${LETTER_SOUND[first]||first}!`),
      okSpeech:`${w.w} começa com ${LETTER_SOUND[first]||first}!`,
      options: makeOpts(first, pool, lv===9? 3:5)
    };
  }
  if(lv===11){ /* SEGUNDA letra: todas começam igual (pedido do papai!) */
    const set = pick(SECOND_SETS);
    const target = pick(set.words);
    return {
      kind:"opts", prompt:"Todas começam igual! Leia a 2ª letra!",
      visual:`<span class="big-emoji">${target.e}</span>`,
      speech:[ptT(`Atenção! Todas as palavras começam com a mesma letra! Encontre a palavra ${target.w}. Leia a segunda letra!`)],
      hintSpeech: ptT(`${target.w}! A segunda letra é ${LETTER_SOUND[target.w[1]]||target.w[1]}!`),
      okSpeech:`${target.w}!`,
      optClass:"mid-text",
      options: makeOpts(target, set.words, Math.min(4,set.words.length), x=>x.w)
    };
  }
  if(lv===12){ /* primeira sílaba */
    const w = pick(WORDS.filter(x=>x.syl.length>=2));
    const first = w.syl[0];
    const pool = shuffle(Object.values(SYL_FAMILIES).flat().filter(s=>s!==first)).slice(0,3).concat(first);
    return {
      kind:"opts", prompt:"Qual é a primeira sílaba?",
      visual:`<span class="big-emoji">${w.e}</span>`,
      speech:[ptT(`${w.w}! Qual é o primeiro pedacinho de ${w.w}?`)],
      hintSpeech: ptT(`${w.syl.join("... ")}... ${w.w}!`),
      okSpeech:`${first}! ${w.w}!`,
      options: makeOpts(first, pool, 4)
    };
  }
  if(lv===13 || lv===14){ /* LER palavra → achar figura (não fala a palavra!) */
    const w = pick(WORDS);
    return {
      kind:"opts", prompt:"Leia a palavra e ache a figura!",
      visual:`<div class="read-word">${w.w}</div>`,
      speech:[ptT("Leia a palavra e toque na figura certa! Você consegue!")],
      hintSpeech: ptT(`${w.syl.join("... ")}...`),
      okSpeech:`${w.w}!`,
      optClass:"emoji-opt",
      options: makeOpts(w, WORDS, lv===13? 3:5, x=>x.e)
    };
  }
  if(lv===15){ /* palavras parecidas */
    const set = pick(SIM_SETS);
    const target = pick(set.fam);
    return {
      kind:"opts", prompt:"Cuidado! São parecidas! Leia com atenção!",
      visual:`<span class="big-emoji">${set.emo[target]}</span>`,
      speech:[ptT(`Atenção, são palavras parecidas! Encontre a palavra ${target}!`)],
      hintSpeech: ptT(`${target}! Começa com ${LETTER_SOUND[target[0]]||target[0]}!`),
      okSpeech:`${target}!`,
      optClass:"mid-text",
      options: makeOpts(target, set.fam, Math.min(4,set.fam.length))
    };
  }
  if(lv===16){ /* montar com sílabas */
    const w = pick(WORDS.filter(x=>x.syl.length>=2));
    const decoys = shuffle(Object.values(SYL_FAMILIES).flat().filter(s=>!w.syl.includes(s))).slice(0,2);
    return {
      kind:"tiles", prompt:"Monte a palavra com as sílabas!",
      visual:`<span class="big-emoji">${w.e}</span>`,
      speech:[ptT(`Monte a palavra ${w.w}! ${w.syl.join("... ")}!`)],
      hintSpeech: ptT(`${w.syl.join("... ")}!`),
      okSpeech:`${w.w}!`,
      pieces: w.syl, decoys, sayPieces:true, answer:w.w
    };
  }
  if(lv===17){ /* montar com letras */
    const w = pick(WORDS.filter(x=>x.w.length<=4));
    const decoys = shuffle(AZ.filter(l=>!w.w.includes(l))).slice(0,2);
    return {
      kind:"tiles", prompt:"Monte a palavra com as letras!",
      visual:`<span class="big-emoji">${w.e}</span>`,
      speech:[ptT(`Monte a palavra ${w.w}, letra por letra!`)],

  /* 26+: MESTRE — mistura os níveis difíceis */

/* ---- matemática ---- */
function emojiGroup(n, emoji, gone){
  const g = gone||0;
  let h = `<div class="emoji-group">`;
  for(let i=0;i<n;i++) h += `<span class="emoji-item${i>=n-g?" gone":""}" style="animation-delay:${i*.06}s">${emoji}</span>`;
  return h+`</div>`;
}
function numOpts(correct, min, max, n){
  const set = new Set([correct]);
  let guard = 0;
  while(set.size<n && guard++<200){
    const v = min + rand(max-min+1);
    set.add(v);
  }
  return shuffle([...set]).map(v=>({label:String(v), correct:v===correct}));
}

/* dá voz às opções: errou → o jogo fala o nome do que a criança tocou */
function withSay(opts, pool, lang){
  opts.forEach(o=>{
    const src = pool.find(p=>p.d===o.label);
    if(src) o.say = {t:src.v, lang};
  });
  return opts;
}

function genEn(lv){

    const NUMS = deep?EN_NUMS_X:EN_NUMS;

      kind:"opts", prompt:"Ouça o número em inglês!",

  if(lv===10){ /* how many — conta E FALA em inglês (senão vira questão de matemática!) */

    const n = 1+rand(top), e = pick(COUNT_EMOJIS);

      options: withSay(makeOpts(item, pool, lv===11?3:5, x=>x.d), pool, "en-US")
    };

      speech:[ptT("Monte a palavra:"), enT(item.v+"!")],

    };

      answer:item.v, maxLen:item.v.length
    };

    const item = EN_ALL_X.concat(EN_COLORS_X).find(x=>x.v===w) || {d:"🗣️"};

    };
  }

    const animal = pick(aPool);

    let guard = 0;
    while(opts.length<3 && guard++<50){

      if(oc===color && oa===animal) continue;
      const o = {d:`${oa.d}${oc.d}`, v:`The ${oa.v} is ${oc.v}`};

      options: shuffle(opts).map(o=>({label:o.d, correct:o===correct, say:{t:o.v, lang:"en-US"}}))

/* =============== LOJA =============== */
const RAR_ORDER = ["comum","raro","epico","lendario"];
function renderShop(){
  const p = P(), grid = $("#shop-grid");
  grid.innerHTML = "";
  const sorted = STICKERS.slice().sort((a,b)=>RAR_ORDER.indexOf(a[2])-RAR_ORDER.indexOf(b[2]));
  sorted.forEach(([emo,nm,rar],i)=>{
    const owned = p.stickers.includes(nm);
    const price = RARITIES[rar].price;
    const card = document.createElement("div");
    card.className = `shop-card r-${rar}` + (owned?"":" locked-card");
    card.style.animationDelay = (Math.min(i,14)*.04)+"s";
    card.innerHTML = `${rar==="lendario"?'<div class="shine"></div>':""}
      <span class="emo">${emo}</span>
      <span class="nm">${nm}</span>
      <span class="rar rar-${rar}">${RARITIES[rar].label}</span>
      ${owned? `<span class="owned-tag">✔ Sua!</span>`
             : `<button class="buy-btn" ${p.coins<price?"disabled":""}>🪙 ${price}</button>`}`;
    if(!owned){
      const btn = card.querySelector(".buy-btn");
      btn.onclick = ()=>{
        if(p.coins < price) return;
        p.coins -= price;
        p.stickers.push(nm);
        save(); updateHUD(); coinBump(); confetti(40); sndLevelUp();
        speak(`Uau! Você comprou ${nm}! Que figurinha ${rar==="lendario"?"lendária":rar==="epico"?"épica":rar==="raro"?"rara":"linda"}!`);
        renderShop();
      };
    }
    grid.appendChild(card);
  });
}
