    card.className = `shop-card r-${rar}` + (owned?"":" locked-card");
    card.style.animationDelay = (Math.min(i,14)*.04)+"s";
    card.innerHTML = `${owned&&rar==="lendario"?'<div class="shine"></div>':""}
      <span class="emo">${owned?emo:"❓"}</span>
      <span class="nm">${owned?nm:"???"}</span>
      <span class="rar rar-${rar}">${RARITIES[rar].label}</span>`;
    if(owned) card.onclick = ()=>{ sndTap(); confetti(10); speak(nm+"!"); };
    grid.appendChild(card);
  });
}

/* =============== JORNADA =============== */
let journeyTrack = "pt";
function openJourney(track){
  if(track) journeyTrack = track;
  document.querySelectorAll(".jtab").forEach(b=>b.classList.toggle("sel", b.dataset.track===journeyTrack));
  renderJourney();
  showScreen("screen-journey");
}
function renderJourney(){
  const p = P(), t = journeyTrack, list = $("#journey-list");
  list.innerHTML = "";
  const cur = p.lv[t], mx = maxOf(t);
  TRACKS[t].levels.forEach((name,i)=>{
    const lv = i+1;
    const st = lv<cur? "done" : lv===Math.min(cur,mx)? "now" : "lock";
    const item = document.createElement("button");
    item.className = "j-item "+st;
    item.innerHTML = `<span class="jn">${st==="done"?"✔":lv}</span>
      <span class="jt">${name}</span>
      <span class="js">${st==="done"?"Treinar 🪙":st==="now"?"Jogar ▶":"🔒"}</span>`;
    item.onclick = ()=>{
      sndTap();
      if(st==="done"){ startPractice(t, lv); }
      else if(st==="now"){ startGame(t); }
      else speak("Esse nível ainda está trancado! Continue jogando pra chegar lá!");
    };
    list.appendChild(item);
  });
  if(cur > mx){
    const item = document.createElement("button");
    item.className = "j-item now";
    item.innerHTML = `<span class="jn">👑</span><span class="jt">Modo Mestre — mistura tudo!</span><span class="js">Jogar ▶</span>`;
    item.onclick = ()=>{ sndTap(); startGame(t); };
    list.appendChild(item);
  }
}

/* =============== RANKING =============== */
function openRanking(){
  const total = TRACK_KEYS.reduce((s,t)=>s+maxOf(t),0);
  const rows = db.profiles.map(p=>{
    const lvls  = TRACK_KEYS.reduce((s,t)=>s+Math.min((p.lv[t]||1)-1, maxOf(t)),0);
    const hits  = TRACK_KEYS.reduce((s,t)=>s+((p.stats[t]||{}).a||0),0);
    const words = Object.values(p.mast||{}).filter(v=>v>=MASTERY).length;
    return {p, lvls, hits, words};
  }).sort((a,b)=> b.lvls-a.lvls || b.hits-a.hits);
  const medal = i => ["🥇","🥈","🥉"][i] || "🏅";
  const trs = rows.map((r,i)=>`<tr${i===0?' style="background:#fff8e1;font-weight:800;"':''}>
    <td>${medal(i)} ${r.p.avatar} ${r.p.name}</td>
    <td>${r.lvls}/${total}</td><td>${r.hits}</td><td>${r.words}</td><td>${r.p.stickers.length}</td></tr>`).join("");
  showOverlay(`<div id="parents-card">
    <h2 style="text-align:center;color:#454a75;">🏆 Ranking</h2>
    <table><tr><th>Jogador</th><th>Níveis</th><th>Acertos</th><th>Palavras 🏅</th><th>Figurinhas</th></tr>${trs}</table>
    <p style="text-align:center;">Quem completa mais níveis lidera. A dedicação (acertos) desempata! 💪</p>
    <div style="text-align:center;margin-top:10px;"><button class="ov-btn" id="rank-close">Fechar</button></div>
  </div>`);
  if(rows.length >= 2) speak(`${rows[0].p.name} está em primeiro lugar, com ${rows[0].lvls} níveis completados! Quem vai alcançar?`);
  else if(rows.length) speak(`${rows[0].p.name}, você já completou ${rows[0].lvls} níveis! Continue assim!`);
  $("#rank-close").onclick = ()=>{ sndTap(); hideOverlay(); };
}

/* =============== PAINEL DOS PAIS =============== */
function openParents(){
  const p = P();
  let report = "";
  if(p){
    const rows = TRACK_KEYS.map(t=>{
      const s = p.stats[t], tot = s.a+s.e;
      const pct = tot? Math.round(s.a/tot*100) : "—";
      return `<tr><td>${TRACKS[t].icon} ${TRACKS[t].name}</td><td>${Math.min(p.lv[t],maxOf(t))}${p.lv[t]>maxOf(t)?" 👑":""}/${maxOf(t)}</td><td>${s.a}</td><td>${s.e}</td><td>${pct}${tot?"%":""}</td></tr>`;
    }).join("");
    report = `<h3>📊 Relatório de ${p.avatar} ${p.name}</h3>
      <table><tr><th>Trilha</th><th>Nível</th><th>Acertos</th><th>Erros</th><th>Aproveitamento</th></tr>${rows}</table>
      <p>🪙 ${p.coins} moedas · 🏆 ${p.stickers.length}/${STICKERS.length} figurinhas</p>`;
  }
  showOverlay(`<div id="parents-card">
    <h2 style="text-align:center;color:#454a75;">ℹ️ Para os pais</h2>
    ${report}
    <h3>🎌 Método Kumon</h3>
    <p>Micro-passos: cada nível ensina UMA coisinha nova. A criança precisa de ${GOAL} acertos para avançar (domínio antes de progresso). Errar não pune — o jogo dá dicas e sugere revisar o nível anterior quando percebe dificuldade.</p>
    <p>A trilha de Português segue as <b>etapas oficiais do Kumon</b>: <b>7A</b> ouvir e apontar → <b>6A</b> letras → <b>5A</b> sílabas → <b>4A/3A/2A</b> palavras → <b>A</b> sons especiais → <b>B</b> frases → <b>C</b> pequenas histórias. Nos níveis 🏅 (domínio de palavras) a MESMA palavra repete 3 vezes — ouvir, ler sozinho e montar — até ser dominada, exatamente como a repetição do Kumon.</p>
    <h3>🔁 Reforço automático + fundamento</h3>
    <p>Errou uma questão? Ela entra na fila de reforço e <b>volta misturada</b> nas próximas perguntas (no mesmo nível e nos seguintes) até a criança acertar <b>3 vezes</b>. Depois vêm <b>2 questões novas da mesma lição</b> (🔁💡 fundamento) — para provar que entendeu a <i>lógica</i>, não só decorou aquela pergunta. Errou em qualquer fase? A contagem daquela fase recomeça. A criança sempre passa de nível normalmente — o reforço vai junto, sem frustração. O contador 🔁 na barra mostra quantas lições estão na fila.</p>
    <h3>🥨 Trilha de Alemão</h3>
    <p>Mesma progressão do Inglês: ouvir → ler → montar → escrever → ditado → falar 🎤 → frases. As palavras de escrita usam só letras A-Z (o teclado não tem Ä, Ö, Ü). A Matemática também ganhou a <b>continuação B e C</b>: metade, somas até 50, tabuadas do 2, 5 e 10, divisão e probleminhas.</p>
    <h3>🎤 Microfone não funciona?</h3>
    <p>Se o jogo foi aberto com <b>duplo clique</b> (endereço começa com <b>file://</b>), o navegador <b>nega o microfone sem nem perguntar</b> — é uma regra do Chrome/Edge. Solução: abra o jogo pelo <b>JOGAR.bat</b> que está na pasta do jogo (ele abre em http://127.0.0.1:8123 e aí o pedido de permissão aparece — clique em <b>Permitir</b>). <b>Atenção:</b> o progresso não passa sozinho do jeito antigo pro novo endereço — no jogo antigo use "💾 Salvar em arquivo" e no novo "📂 Recuperar de arquivo" (uma vez só). Se ainda bloquear: cadeado 🔒 na barra → Microfone → Permitir; e em Configurações do Windows → Privacidade e segurança → Microfone, ligue o acesso para aplicativos. O reconhecimento de voz precisa de internet.</p>
    <p style="text-align:center;"><button class="ov-btn alt" id="parents-mictest">🎤 Testar microfone agora</button></p>
    <div id="mic-test-out" style="text-align:center;font-weight:600;min-height:1.4em;"></div>
    <h3>📚 Nivelamento → Aprender de verdade</h3>
    <p>Até o primeiro erro, o jogo funciona como <b>teste de nivelamento</b>: base pequena, 5 acertos por nível — a criança avança rápido pelo que já sabe. Quando ela erra (do nível 3 em diante), aquele nível vira o <b>nível real</b> dela: dali pra cima destrava a <b>base completa</b> (todas as cores, muito mais bichos, comidas, coisas e números até 20), a meta sobe pra <b>10 acertos</b> (níveis de domínio 🏅: 4 palavras) e <b>só acerto limpo conta</b> — se errou na pergunta, ela volta pra fila. O 📚 no topo mostra que o modo aprender está ativo naquele nível.</p>
    <h3>🔤 Método fônico</h3>
    <p>Letra + som + imagem sempre juntos. A voz fala tudo, então a criança joga sozinha mesmo sem saber ler.</p>
    <h3>🪙 Economia de moedas</h3>
    <p>Acertos valem moedas (níveis altos valem mais; escrever/falar vale 50% a mais). Figurinhas lendárias custam 2000 moedas — incentivo para treinar níveis antigos na Jornada (repetição espaçada, como no Kumon).</p>
    <h3>💡 Dicas</h3>
    <ul>
      <li>Use <b>Chrome ou Edge</b> para a melhor voz em português e inglês.</li>
      <li>Os níveis de microfone 🎤 precisam de internet e permissão de microfone.</li>
      <li>Toque no nome da criança (canto superior) para trocar de jogador.</li>
    </ul>
    <h3>💾 Progresso protegido</h3>
    <p>O jogo salva sozinho (com cópia de segurança) a cada acerto. Para garantir de vez, salve um arquivo de vez em quando — dá pra recuperar tudo em qualquer computador.</p>
    <div style="text-align:center;">
      <button class="ov-btn alt" id="parents-export">💾 Salvar em arquivo</button>
      <button class="ov-btn alt" id="parents-import">📂 Recuperar de arquivo</button>
      <input type="file" id="import-file" accept=".json,application/json" style="display:none;">
    </div>
    <div style="text-align:center;margin-top:12px;">
      <button class="ov-btn alt" id="parents-ranking">🏆 Ranking</button>
      <button class="ov-btn alt" id="parents-switch">👥 Trocar jogador</button>
      <button class="ov-btn" id="parents-close">Fechar</button>
    </div>
  </div>`);
  $("#parents-close").onclick = ()=>{ sndTap(); hideOverlay(); };
  $("#parents-switch").onclick = ()=>{ sndTap(); hideOverlay(); goProfiles(); };
  $("#parents-ranking").onclick = ()=>{ sndTap(); hideOverlay(); openRanking(); };
  $("#parents-mictest").onclick = ()=>{ sndTap(); micTest(); };
  $("#parents-export").onclick = ()=>{ sndTap(); exportSave(); };
  $("#parents-import").onclick = ()=>{ sndTap(); $("#import-file").click(); };
  $("#import-file").onchange = ev=>{ const f = ev.target.files[0]; if(f) importSave(f); };
}

/* =============== FUNDO ANIMADO =============== */
function makeBackground(){
  for(let i=0;i<14;i++){
    const b = document.createElement("div");
    b.className = "bubble";
    const s = 18+rand(70);
    b.style.width = b.style.height = s+"px";
    b.style.left = rand(100)+"%";
    b.style.animationDuration = (9+Math.random()*16)+"s";
    b.style.animationDelay = (-Math.random()*16)+"s";
    document.body.appendChild(b);
  }
  ["⭐","🌈","🎈","☁️","🦋","🌟"].forEach((e,i)=>{
    const f = document.createElement("div");
    f.className = "floatmoji";
    f.textContent = e;
    f.style.left = (5+i*16)+"%";
    f.style.top = (8+rand(80))+"%";
    f.style.animationDuration = (3+Math.random()*3)+"s";
    document.body.appendChild(f);
  });
}

/* =============== INIT =============== */
function init(){
  makeBackground();
  load();

  $("#btn-pt").onclick   = ()=>{ sndTap(); startGame("pt"); };
  $("#btn-math").onclick = ()=>{ sndTap(); startGame("math"); };
  $("#btn-en").onclick   = ()=>{ sndTap(); startGame("en"); };
  $("#btn-de").onclick   = ()=>{ sndTap(); startGame("de"); };
  $("#btn-shop").onclick = ()=>{ sndTap(); renderShop(); showScreen("screen-shop");
    speak("Bem-vindo à loja! Compre figurinhas com suas moedas!"); };
  $("#btn-album").onclick = ()=>{ sndTap(); renderAlbum(); showScreen("screen-album"); };
  $("#btn-journey").onclick = ()=>{ sndTap(); openJourney(); };
  $("#btn-ranking").onclick = ()=>{ sndTap(); openRanking(); };
  $("#btn-ranking-prof").onclick = ()=>{ sndTap(); openRanking(); };

  $("#btn-back").onclick = ()=>{ sndTap(); stopMic(); speechSynthesis.cancel();
    if(state.practice) openJourney(state.track); else goHome(); };
  $("#btn-back-shop").onclick = ()=>{ sndTap(); goHome(); };
  $("#btn-back-album").onclick = ()=>{ sndTap(); goHome(); };
  $("#btn-back-journey").onclick = ()=>{ sndTap(); goHome(); };

  document.querySelectorAll(".jtab").forEach(b=>{
    b.onclick = ()=>{ sndTap(); openJourney(b.dataset.track); };
  });

  $("#profile-chip").onclick = ()=>{ sndTap(); goProfiles(); };
  $("#coin-pill").onclick = ()=>{ if(P()){ sndTap(); renderShop(); showScreen("screen-shop"); } };
  $("#btn-parents").onclick = ()=>{ sndTap(); openParents(); };
  $("#speak-again").onclick = ()=>{ if(state.q) speak(state.q.speech); };
  $("#lesson-next").onclick = ()=>{ sndTap(); if(lesson){ lesson.gen++; if("speechSynthesis" in window) speechSynthesis.cancel(); lessonNext(); } };
  $("#lesson-skip").onclick = ()=>{ sndTap(); if(lesson) lessonDone(); };
  $("#lesson-replay").onclick = ()=>{
    if(!state.track) return;
    stopMic();
    playLesson(state.track, curLevel(), ()=>{ showScreen("screen-game"); if(state.q) speak(state.q.speech); });
  };

  document.querySelectorAll("#mascot,.mascot").forEach(m=>{
    m.onclick = ()=>{ confetti(10);
      const p = P();
      speak(p? pick([`Oi ${p.name}! Vamos aprender brincando?`,`${p.name}, você é demais!`,`Vamos ganhar moedas, ${p.name}?`])
             : "Oi! Escolha seu jogador pra começar!"); };
  });

  updateHUD();
  if(db.activeIdx >= 0 && P()) goHome();
  else { renderProfiles(); showScreen("screen-profiles"); }
}

init();
</script>
